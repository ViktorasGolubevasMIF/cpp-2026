site_name: Objektinis programavimas C++. INF-1K
site_url: https://viktorasgolubevasmif.github.io/cpp-2026/
repo_url: https://github.com/ViktorasGolubevasMIF/cpp-2026
repo_name: GitHub cpp-2026

# Temos nustatymai
theme:
  name: material
  language: lt           # Lietuvių kalba (paieškai ir mygtukams)
  
  # Spalvų paletė (Dark/Light mode mygtukas viršuje)
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Perjungti į tamsų režimą
    - scheme: slate      # Tamsi tema
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Perjungti į šviesų režimą

  features:
    - navigation.expand       # Išskleidžia meniu
    - navigation.top          # "Back to top" mygtukas
    - navigation.tabs         # Meniu perkelia į viršų (kaip naršyklės tab'ai) - gražiau
    - navigation.instant        # ← SPA-like navigation
    - navigation.tracking       # ← URL tracking
    - content.code.copy       # "Copy" mygtukas prie kodo
    - content.code.annotate   # ← NAUJAS: leidžia kodo anotacijas (1)

# Markdown plėtiniai (Čia prasideda magija)
markdown_extensions:
  # Leidžia naudoti !!! note "Pastaba" blokus
  - admonition
  
  # Leidžia sutraukti blokus (pvz. ilgiems sprendimams)
  - pymdownx.details
  
  # Kodo spalvinimas
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  
  # Reikalinga, kad veiktų Mermaid diagramos ir kodų blokai
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # SKIRTUKAI (Tabs) - jūsų C vs C++ palyginimams
  - pymdownx.tabbed:
      alternate_style: true 
  
  # Matematinės formulės (jei reikės Big-O notacijai)
  - pymdownx.arithmatex:
      generic: true
  
  # ═══════════════════════════════════════════════════════════
  # 🎯 NAUJAS: Kodo įterpimas iš failų!
  # ═══════════════════════════════════════════════════════════
  - pymdownx.snippets:
      base_path: 
        - 'docs'           # ieško docs/ kataloge
        - 'docs/Paskaitos' 
        - '.'              # ieško repo root'e (pvz. code/)
      check_paths: true    # patikrina, ar failai egzistuoja
      dedent_subsections: true  # automatinis indentation fix
      restrict_base_path: false  # leidžia pasiekti visą repo

# Jūsų meniu struktūra
nav:
  - 'Pradžia': index.md
  - 'Temos':
    - 'Geresnis C':
      - 'Parametrų perdavimas': Temos/Better_C/ParamPass.md
    - 'OOP': 
      - 'Kompozicija': Temos/OOP/Kompozicija.md
      - 'Kompozicija su pimpl v2C': Temos/OOP/Kompozicija_pimpl_v2C.md
  - 'Paskaitos':
    - '01 Paskaita': 
      - 'Parametrų perdavimas (su Tutor)': Paskaitos/01/Parameters_Passing.md
      - 'C/C++ sistema (pdf)': Paskaitos/01/C_System.pdf
      - 'Parametrų perdavimas (pdf)': Paskaitos/01/Parameters_Passing.pdf
    - '02-03 Paskaita': 
      - 'Stack ADT Evoliucija C kalboje: 01-09': Paskaitos/02/02_Paskaita_Stack_Evolution_C_01_09.md
      - 'Stack ADT Evoliucija C++ kalboje: 11-16': Paskaitos/02/02_Paskaita_Stack_Evolution_CPP_11_16.md
    - '04 Paskaita': 
      - 'Klasė, objektas, kompozicija': Paskaitos/04/04_Paskaita_v1.md
  - 'Pratybos':
    - 'Tvarka': Pratybos/Tvarka/UzduociuGidas_1_1.md
    - 'Užduotys':
      - 'U1': Pratybos/Užduotys/U1.md
      - 'U2': Pratybos/Užduotys/U2_v2.md
      - 'U3':
        - '01-04': Pratybos/Užduotys/U3.md
        - 'bonus': Pratybos/Užduotys/U3_bonus.md
      - 'U2': Pratybos/Užduotys/U2_v2.md
  - 'Drafts':
    - 'Lectures':
      - 'Klasės Anatomija': Drafts/P3_Klases_Anatomija.md
      - 'Geresnis C': Drafts/P4_Geresnis_C.md
      - 'Įvadas į STL': Drafts/P5_STL_Ivadas.md
      - 'RAII ir Rule of 3': Drafts/P6_P8_RAII_Copy.md
        

# ═══════════════════════════════════════════════════════════
# 🎯 NAUJAS: Extra JavaScript (jei reikės Mermaid ar MathJax)
# ═══════════════════════════════════════════════════════════
extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js